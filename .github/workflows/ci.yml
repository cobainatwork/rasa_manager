name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── 後端 ────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: rasa_admin
          POSTGRES_PASSWORD: ${{ secrets.CI_POSTGRES_PASSWORD || 'ci_test_pw_only' }}
          POSTGRES_DB: rasa_knowledge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      DATABASE_URL: postgresql://rasa_admin:${{ secrets.CI_POSTGRES_PASSWORD || 'ci_test_pw_only' }}@localhost:5432/rasa_knowledge_test
      TEST_DATABASE_URL: postgresql://rasa_admin:${{ secrets.CI_POSTGRES_PASSWORD || 'ci_test_pw_only' }}@localhost:5432/rasa_knowledge_test
      REDIS_URL: redis://localhost:6379/0
      SEED_ADMIN_USERNAME: admin
      SEED_ADMIN_PASSWORD: ${{ secrets.CI_SEED_ADMIN_PASSWORD || 'CiAdmin1234' }}

    steps:
      - uses: actions/checkout@v4

      - name: Generate JWT secret for CI
        run: echo "JWT_SECRET=$(openssl rand -hex 32)" >> $GITHUB_ENV

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run pytest with coverage
        run: |
          pytest tests/ \
            --cov=api \
            --cov-report=xml \
            --cov-report=term-missing \
            -q

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          if-no-files-found: ignore

      - name: Dependency vulnerability scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42974 || true

      - name: SAST scan (Bandit)
        run: |
          pip install bandit
          bandit -r api/ -ll -x api/database/migrations/ || true

  # ── 前端 ────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (TypeScript)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm test

      - name: Build
        run: npm run build

  # ── Docker Build 驗證 ───────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Copy env file
        run: cp .env.example .env 2>/dev/null || echo "DATABASE_URL=postgresql://u:p@db/db" > .env

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: rasa-kb-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: rasa-kb-frontend:ci

      - name: Container vulnerability scan (Trivy - backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rasa-kb-backend:ci
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH

      - name: Container vulnerability scan (Trivy - frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rasa-kb-frontend:ci
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
