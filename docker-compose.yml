name: rasa_rag

services:

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rasa_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必須在 .env 中設定}
      POSTGRES_DB: ${POSTGRES_DB:-rasa_knowledge}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rasa_admin -d rasa_knowledge"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    command: celery -A tasks.celery_app worker --concurrency=2 --loglevel=info
    volumes:
      - ./scripts:/opt/scripts:ro
      # 外部 ingestion script 目錄（Windows 路徑）
      # Agent.ingest_script_path 應設為 /opt/rasa_integration/ingest_kb.py
      - D:/code-coll/rasa_integration:/opt/rasa_integration:ro
      - rasa_docs:/opt/rasa_docs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:8080"
    depends_on:
      - backend

volumes:
  pg_data:

  rasa_docs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./data/volumes/rasa_docs
