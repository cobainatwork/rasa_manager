name: rasa_rag

networks:
  app:
  data:
    internal: true

services:

  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rasa_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD 必須在 .env 中設定}
      POSTGRES_DB: ${POSTGRES_DB:-rasa_knowledge}
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD 必須在 .env 設定}
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必須在 .env 設定}
    ports:
      # 僅 dev 環境需要對外暴露；production 應由 frontend nginx 反代
      - "8000:8000"
    networks:
      - app
      - data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必須在 .env 設定}
      PYTHONPATH: /app   # 確保 celery prefork 子程序能 import api.*
      OPENAI_API_KEY: ${OPENAI_API_KEY:?OPENAI_API_KEY 必須在 .env 設定}
      QDRANT_URL: ${QDRANT_URL:?QDRANT_URL 必須在 .env 設定}
    command: celery -A tasks.celery_app worker --concurrency=2 --loglevel=info
    healthcheck:
      # celery worker 不開 HTTP 8000，停用 backend image 繼承來的 HEALTHCHECK
      disable: true
    volumes:
      - ./scripts:/opt/scripts:ro
      # 專案根目錄（ingest_kb.py 所在位置）→ 容器內 /opt/project
      - ${PROJECT_ROOT:-.}:/opt/project:ro
      # TXT 輸出目錄：主機路徑與容器路徑保持一致，
      # 使 agents.txt_output_path 直接填主機路徑即可，無需手動對應。
      - ${TXT_OUTPUT_HOST_PATH:?TXT_OUTPUT_HOST_PATH 必須在 .env 設定}:${TXT_OUTPUT_HOST_PATH}:rw
    networks:
      - app
      - data
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "5173:8080"
    networks:
      - app
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pg_data:
  redis_data:
